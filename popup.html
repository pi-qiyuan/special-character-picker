<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__MSG_extName__</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <div class="container">
    <!-- Milestone Banner -->
    <div id="milestone-banner" class="milestone-banner" style="display: none;">
      <div class="milestone-content">
        <span id="milestone-message"></span>
        <div class="milestone-actions">
          <button id="milestone-rate-btn" class="milestone-btn" data-i18n="rateUs">Rate</button>
          <button id="milestone-coffee-btn" class="milestone-btn" data-i18n="buyMeCoffee">Coffee</button>
          <button id="milestone-close-btn" class="milestone-close" aria-label="Close">&times;</button>
        </div>
      </div>
    </div>

    <h1 data-i18n="title">Special Character Picker</h1>
    
    <div class="quick-access-buttons">
      <button id="common-btn" class="action-btn" data-i18n="commonBtn">Common</button>
      <button id="favorites-btn" class="action-btn" data-i18n="favoritesBtn">My Favorites</button>
    </div>

    <div class="filter-bar">
      <div class="category-selection">
        <label for="category-select" data-i18n="categoryLabel">Category:</label>
        <div class="category-select-wrapper">
          <select id="category-select">
            <!-- Options will be dynamically generated here -->
          </select>
          <button id="manage-cats-btn" class="manage-btn" title="Manage Categories" data-i18n-title="manageCategories" style="display: none;">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" /></svg>
          </button>
        </div>
      </div>

      <div class="search-container">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search characters...">
          <button id="search-clear-btn" class="search-clear-btn" aria-label="Clear" title="Clear" style="display: none;">&times;</button>
        </div>
      </div>
    </div>

    <div class="grid-container" id="char-grid">
      <!-- Characters will be dynamically generated here -->
    </div>
    
    <div class="mode-selection">
      <label><input type="radio" name="mode" value="directCopy" checked> <span data-i18n="modeDirectCopy">Direct Copy</span></label>
      <label><input type="radio" name="mode" value="directInsert"> <span data-i18n="modeDirectInsert">Direct Insert</span></label>
      <label><input type="radio" name="mode" value="appendEdit"> <span data-i18n="modeAppendEdit">Append & Edit</span></label>
    </div>

    <div class="editor-container">
      <input type="text" id="editor-input" data-i18n-placeholder="editorPlaceholder" placeholder="Edit content here...">
      <button id="clear-btn" class="clear-btn" aria-label="Clear" title="Clear">&times;</button>
    </div>

    <div class="button-container">
      <button id="copy-btn" class="action-btn" data-i18n="copyBtn">Copy</button>
      <button id="insert-btn" class="action-btn" data-i18n="insertBtn">Insert</button>
    </div>

    <div class="footer">
      <a href="https://hugbear.ai" id="about-link" data-i18n="aboutLink" target="_blank">About Us</a>
      <span class="footer-divider"></span>
      <a href="https://ko-fi.com/qiyuanyang" id="coffee-link" data-i18n="buyMeCoffee" target="_blank">❤️ Buy me a coffee</a>
    </div>
  </div>
  <div id="context-menu" class="context-menu" style="display: none;"></div>
  <div id="char-preview" class="char-preview" style="display: none;"></div>

  <!-- Tag Editor Modal -->
  <div id="tag-editor-overlay" class="modal-overlay" style="display: none;">
    <div class="tag-editor-modal">
      <h3 data-i18n="editTags">Edit Search Tags</h3>
      <div class="editing-char-display" id="editing-char-display">©</div>
      
      <div class="tag-field">
        <label data-i18n="defaultTagsLabel">Default Tags:</label>
        <div id="default-tags-display" class="default-tags-box"></div>
      </div>

      <div class="tag-field">
        <label data-i18n="userTagsPlaceholder">Add your own tags:</label>
        <input type="text" id="user-tags-input" data-i18n-placeholder="userTagsPlaceholder">
      </div>

      <div class="modal-buttons">
        <button id="cancel-tags-btn" class="modal-btn cancel" data-i18n="cancel">Cancel</button>
        <button id="save-tags-btn" class="modal-btn save" data-i18n="save">Save</button>
      </div>
    </div>
  </div>

  <!-- Category Manager Modal -->
  <div id="cat-manager-overlay" class="modal-overlay" style="display: none;">
    <div class="cat-manager-modal">
      <h3 data-i18n="manageCategories">Manage Categories</h3>
      <div id="cat-list" class="cat-list">
        <!-- Categories will be listed here -->
      </div>
      <div class="add-cat-field">
        <input type="text" id="new-cat-input" data-i18n-placeholder="addCategory" placeholder="New Category Name">
        <button id="add-cat-btn" class="modal-btn save" data-i18n="save">Add</button>
      </div>
      <div class="modal-buttons">
        <button id="close-cat-manager-btn" class="modal-btn cancel" data-i18n="close">Close</button>
      </div>
    </div>
  </div>

  <!-- Category Selector Modal (for adding favorites) -->
  <div id="cat-selector-overlay" class="modal-overlay" style="display: none;">
    <div class="cat-selector-modal">
      <h3 data-i18n="selectCategory">Select Category</h3>
      <div id="cat-options" class="cat-options-list">
        <!-- Category options will be listed here -->
      </div>
      <div class="modal-buttons">
        <button id="cancel-cat-selector-btn" class="modal-btn cancel" data-i18n="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/popup.js"></script>
</body>
</html>
